<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · EventPortal</title>
  <meta name="description" content="Reset your EventPortal password via email." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/welcome.css" />
  <style>
    .auth-foot {
      text-align: center;
      margin-top: 1.25rem;
      color: #64748b;
      font-size: 0.875rem;
    }
    .auth-foot a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .auth-foot a:hover { color: #1d4ed8; text-decoration: underline; }

    .alert {
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      display: none;
    }
    .alert-success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #16a34a;
    }
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
    }

    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.25rem;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .success-box {
      text-align: center;
      display: none;
      padding: 1rem 0;
    }
    .success-box .check-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }
    .success-box h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }
    .success-box p {
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 0;
    }
    .success-box strong { color: #2563eb; }
  </style>
</head>

<body>
  <div class="auth-shell">
    <div class="auth-card">

      <!-- Form view -->
      <div id="formView">
        <h1>Forgot Password?</h1>
        <p>Enter your email and role — we'll send a reset link.</p>

        <div id="alertSuccess" class="alert alert-success" role="alert"></div>
        <div id="alertError"   class="alert alert-error"   role="alert"></div>

        <form id="forgotForm">
          <div class="input-group mb-3">
            <label for="fpEmail">Email Address</label>
            <input id="fpEmail" type="email" class="glass-input"
              placeholder="you@example.com" required autocomplete="email" />
          </div>

          <div class="input-group mb-3">
            <label for="fpRole">Your Role</label>
            <select id="fpRole" class="glass-input modern-select">
              <option value="student">Student</option>
              <option value="organizer">Organizer</option>
            </select>
          </div>

          <button id="fpBtn" type="submit" class="btn-primary">Send Reset Link</button>
        </form>

        <div class="auth-foot">
          Remembered it? <a href="login.html">Back to Login</a>
        </div>
      </div>

      <!-- Success view -->
      <div class="success-box" id="successView">
        <div class="check-icon">✅</div>
        <h2>Check Your Inbox!</h2>
        <p>
          A password reset link was sent to<br>
          <strong id="sentEmail"></strong>
        </p>
        <p style="margin-top:0.5rem; color:#94a3b8; font-size:0.8rem;">
          Link expires in 15 minutes. Check your spam folder if needed.
        </p>
        <div class="auth-foot" style="margin-top:1.25rem">
          <a href="login.html">← Back to Login</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const form        = document.getElementById('forgotForm');
    const btn         = document.getElementById('fpBtn');
    const alertOk     = document.getElementById('alertSuccess');
    const alertErr    = document.getElementById('alertError');
    const formView    = document.getElementById('formView');
    const successView = document.getElementById('successView');

    function showError(msg) {
      alertErr.textContent   = msg;
      alertErr.style.display = 'block';
      alertOk.style.display  = 'none';
    }

    function setLoading(on) {
      btn.disabled    = on;
      btn.textContent = on ? 'Sending…' : 'Send Reset Link';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertErr.style.display = 'none';
      alertOk.style.display  = 'none';

      const email = document.getElementById('fpEmail').value.trim();
      const role  = document.getElementById('fpRole').value;

      setLoading(true);
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, role })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          document.getElementById('sentEmail').textContent = email;
          formView.style.display    = 'none';
          successView.style.display = 'block';
        } else {
          showError(data.message || 'Something went wrong. Please try again.');
        }
      } catch {
        showError('Network error. Make sure the server is running.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>

</html>
